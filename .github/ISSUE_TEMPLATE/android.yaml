name: "📱 Android Compatibility Report"
description: Report SSL Pinning, QUIC, or app-specific filtering issues on Android
title: "[Android]: <App Name>"
labels: ["android", "compatibility"]
body:
  - type: markdown
    attributes:
      value: |
        ### Before submitting
        Please ensure you have followed the [Troubleshooting Guide](https://github.com/your-repo#how-to-troubleshoot) in the README.
        * If a specific filter rule is causing the issue, please report it to [AdguardFilters](https://github.com/AdguardTeam/AdguardFilters).
        * This repo is for app-level exclusions and low-level compatibility settings.

  - type: input
    id: app_name
    attributes:
      label: App Name
      placeholder: "e.g., MAX, Sberbank, YouTube"
    validations:
      required: true

  - type: input
    id: package_id
    attributes:
      label: Application Package ID
      placeholder: "e.g., com.google.android.youtube"
    validations:
      required: true

  - type: dropdown
    id: platform_version
    attributes:
      label: Android Version
      options:
        - "Android 14"
        - "Android 13"
        - "Android 12 or lower"
    validations:
      required: true

  - type: dropdown
    id: diagnosis_result
    attributes:
      label: Diagnosis Result
      description: Which troubleshooting step resolved the issue?
      options:
        - "SSL Pinning (Fixed by disabling HTTPS filtering)"
        - "QUIC Issue (Fixed by adding to QUIC bypass)"
        - "Routing Issue (Fixed by disabling 'Route traffic through AdGuard')"
        - "IP/Network Issue (Fixed by excluding IP ranges)"
        - "Other / Not sure"
    validations:
      required: true

  - type: dropdown
    id: suggested_list
    attributes:
      label: Suggested Configuration List
      description: Which list should this app be added to?
      options:
        - "filter_traffic_exclusions.json (Disable routing completely)"
        - "block_ads_exclusions.json (Disable ad blocking)"
        - "filter_https_traffic_exclusions.json (Disable HTTPS filtering)"
        - "quic_pkg_exclusions.txt (Allow QUIC traffic)"
        - "pkg_exclusions.txt (Low-level exclusion)"
        - "ipv4_routes_exclusions.txt (IP exclusion)"
        - "Not sure / Please investigate"
    validations:
      required: true

  - type: textarea
    id: technical_details
    attributes:
      label: Technical Details / Logs
      placeholder: "Paste mitmproxy logs (e.g., TLS alert certificate unknown) or Filtering Log details here."
    validations:
      required: false

  - type: checkboxes
    id: confirmation
    attributes:
      label: Verification
      options:
        - label: "I confirm that this is a compatibility issue, not a missed ad or a filter rule bug."
          required: true
        - label: "I am using default filtering settings for this app."
          required: true

  - type: markdown
    attributes:
      value: "Thank you for contributing! Our team will investigate the Package ID provided."
